    <h1 class="title"><span class="title-text">Comments in Markdown</span></h1>
    <h2 class="subtitle is-6">August 24, 2017 </h2>
    
    <div class="content">
      <p>Markdown 似乎沒有註解的語法，隨意查了一下後發現一個簡單的方法：</p>

<pre><code class="language-markdown">[//]: # ( This is a comment )
</code></pre>

<p>簡單來說就是建一個沒用的 link reference 來當作註解啦。這個方法可以用來設定 Vim 的 modeline，也算是解決了一個小問題。範例：</p>

<pre><code class="language-markdown">[modeline]: # ( vim: set cc=0 tw=0: )
</code></pre>

<p></p>
